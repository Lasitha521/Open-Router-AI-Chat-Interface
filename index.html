<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecno ChatBot | Modern AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-white dark:bg-[#212121] text-gray-800 dark:text-gray-200 transition-colors duration-300 font-sans">
    <script>

        if (localStorage.getItem('tecno_dark') === 'enabled') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <div class="flex h-screen w-full overflow-hidden">
        <aside
            class="w-72 bg-[#f9f9f9] dark:bg-[#171717] hidden md:flex flex-col border-r border-gray-200 dark:border-white/10 transition-all">
            <div class="p-6 flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg theme-accent-bg">
                    <i class="fas fa-robot text-xl"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight">Tecno Chat</h1>
            </div>

            <div class="px-4 flex-1 overflow-y-auto">
                <button id="new-chat"
                    class="w-full flex items-center gap-3 p-3 rounded-xl border border-gray-200 dark:border-white/10 hover:bg-gray-200 dark:hover:bg-white/5 transition-all text-sm font-semibold mb-6 group">
                    <i class="fas fa-plus text-xs group-hover:rotate-90 transition-transform"></i>
                    <span>New Chat</span>
                </button>

                <div class="flex items-center justify-between px-2 mb-3">
                    <div class="text-[11px] uppercase tracking-[0.15em] text-gray-400 font-bold">Recent</div>
                    <button id="clear-history"
                        class="text-[10px] text-red-500 hover:text-red-600 font-bold uppercase transition-opacity opacity-0 group-hover:opacity-100">Clear</button>
                </div>
                <div id="chat-history" class="space-y-1 group"></div>
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-white/10 space-y-2">
                <div class="relative group">
                    <button
                        class="w-full flex items-center gap-3 p-3 hover:bg-gray-200 dark:hover:bg-white/5 rounded-xl transition-all text-sm font-medium">
                        <i class="fas fa-palette opacity-70 theme-accent-text"></i>
                        <span>Appearance</span>
                    </button>
                    <div
                        class="absolute bottom-full left-0 mb-2 w-48 bg-white dark:bg-[#2f2f2f] rounded-2xl shadow-2xl border border-gray-200 dark:border-white/10 hidden group-hover:block z-50 p-2 animate-scale-up">
                        <button onclick="setAccent('blue')"
                            class="w-full flex items-center gap-3 p-2.5 hover:bg-gray-100 dark:hover:bg-white/5 rounded-lg text-xs font-medium transition-colors"><span
                                class="w-3 h-3 rounded-full bg-blue-600"></span> Blue Theme</button>
                        <button onclick="setAccent('purple')"
                            class="w-full flex items-center gap-3 p-2.5 hover:bg-gray-100 dark:hover:bg-white/5 rounded-lg text-xs font-medium transition-colors"><span
                                class="w-3 h-3 rounded-full bg-purple-600"></span> Purple Theme</button>
                        <button onclick="setAccent('rose')"
                            class="w-full flex items-center gap-3 p-2.5 hover:bg-gray-100 dark:hover:bg-white/5 rounded-lg text-xs font-medium transition-colors"><span
                                class="w-3 h-3 rounded-full bg-rose-600"></span> Rose Theme</button>
                        <button onclick="setAccent('emerald')"
                            class="w-full flex items-center gap-3 p-2.5 hover:bg-gray-100 dark:hover:bg-white/5 rounded-lg text-xs font-medium transition-colors"><span
                                class="w-3 h-3 rounded-full bg-emerald-600"></span> Emerald Theme</button>
                    </div>
                </div>
                <button id="open-settings"
                    class="w-full flex items-center gap-3 p-3 hover:bg-gray-200 dark:hover:bg-white/5 rounded-xl transition-all text-sm font-medium">
                    <i class="fas fa-cog opacity-70"></i>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-white dark:bg-[#212121]">
            <header
                class="h-16 flex items-center justify-between px-8 border-b border-gray-200 dark:border-white/5 backdrop-blur-md bg-white/80 dark:bg-[#212121]/80 z-10">
                <div class="flex items-center gap-4">
                    <select id="model-select"
                        class="bg-gray-100 dark:bg-[#2f2f2f] text-sm font-bold py-2 px-4 rounded-full outline-none border border-transparent focus:border-blue-500 transition-all cursor-pointer theme-accent-border-focus">
                        <option value="stepfun/step-3.5-flash:free">StepFun 3.5 Flash</option>
                        <option value="google/gemma-3-27b-it:free">Gemma 3 27B</option>
                        <option value="google/gemma-3-12b-it:free">Gemma 3 12B</option>
                        <option value="nvidia/nemotron-nano-12b-v2-vl:free">Nemotron Nano 12B</option>


                    </select>
                </div>
                <button id="theme-toggle" class="...">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto custom-scrollbar pt-4">
                <div class="max-w-3xl mx-auto px-6 space-y-8 pb-32">
                    <div id="welcome-screen" class="text-center py-24 animate-fade-in">
                        <div
                            class="w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white text-5xl mx-auto mb-10 shadow-2xl theme-accent-bg shadow-blue-500/20">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <h2 class="text-4xl font-black mb-4 tracking-tight">Tecno AI</h2>
                        <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto font-medium">The most creative and
                            modern AI experience for you.</p>
                    </div>
                    <div id="messages-wrapper" class="space-y-10"></div>
                </div>
            </div>

            <div
                class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-white dark:from-[#212121] via-white dark:via-[#212121] to-transparent pt-10">
                <div class="max-w-3xl mx-auto px-6 pb-8">
                    <div id="image-preview-container" class="hidden mb-4 animate-slide-up">
                        <div class="relative inline-block">
                            <img id="image-preview" src=""
                                class="w-28 h-28 object-cover rounded-2xl border-2 border-blue-500 shadow-2xl theme-accent-border">
                            <button id="remove-image"
                                class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-7 h-7 flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i
                                    class="fas fa-times text-xs"></i></button>
                        </div>
                    </div>

                    <div
                        class="relative flex items-end w-full bg-[#f4f4f4] dark:bg-[#2f2f2f] rounded-[30px] p-2 pr-3 shadow-2xl border border-transparent focus-within:bg-white dark:focus-within:bg-[#383838] focus-within:border-gray-200 dark:focus-within:border-white/10 transition-all">
                        <input type="file" id="image-input" accept="image/*" class="hidden">
                        <button id="upload-btn"
                            class="w-12 h-12 flex items-center justify-center text-gray-400 hover:text-blue-500 transition-colors"><i
                                class="fas fa-paperclip text-xl"></i></button>
                        <textarea id="user-input" rows="1" placeholder="Message Tecno Chat..."
                            class="flex-1 bg-transparent p-3 outline-none resize-none max-h-60 text-[16px] leading-relaxed"></textarea>
                        <button id="send-btn"
                            class="w-11 h-11 flex items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-full hover:scale-105 active:scale-95 transition-all shadow-md mb-0.5"><i
                                class="fas fa-arrow-up"></i></button>
                    </div>
                    <p
                        class="text-[11px] text-center mt-4 text-gray-400 font-bold opacity-50 uppercase tracking-widest">
                        Tecno AI 3.5 • Modern Experience</p>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-xl hidden flex items-center justify-center z-50 p-6">
        <div
            class="bg-white dark:bg-[#2f2f2f] p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl border border-white/5 animate-scale-up">
            <h3 class="text-3xl font-black tracking-tight mb-8 text-center">Settings</h3>
            <div class="space-y-8">
                <div>
                    <label
                        class="block text-xs font-black uppercase tracking-[0.2em] text-gray-400 mb-3 px-1">OpenRouter
                        API Key</label>
                    <input type="password" id="api-key-input" placeholder="sk-or-v1-..."
                        class="w-full p-5 rounded-2xl bg-gray-100 dark:bg-[#171717] border-2 border-transparent focus:border-blue-500 outline-none transition-all theme-accent-border-focus font-mono text-sm">
                </div>
                <button id="save-settings"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl theme-accent-bg transition-all">SAVE
                    SETTINGS</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
